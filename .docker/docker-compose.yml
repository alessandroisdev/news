name: "nortedev_news"

services:
  app:
    build:
      context: .
      dockerfile: php/Dockerfile
    restart: unless-stopped
    tty: true
    volumes:
      - ../www:/var/www/html
    networks:
      - portal_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - portal_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-portal}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-portal_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - portal_mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - portal_net

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - portal_redis:/data
    networks:
      - portal_net

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-masterKeyPortalNews}
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - portal_meili:/meili_data
    networks:
      - portal_net

networks:
  portal_net:
    driver: bridge

volumes:
  portal_mysql:
  portal_redis:
  portal_meili:
